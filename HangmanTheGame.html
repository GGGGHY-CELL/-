<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Виселица | Hangman</title>
<link rel="icon" type="image/x-icon" href="C:\Users\ЗС\Desktop\Проект\ИграВиселица\hangman.ico" >
<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
}

    body {
    min-height: 100vh;
    background: radial-gradient(circle at 20% 30%, #0a0a1a, #03030f);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Courier New', 'Segoe UI', monospace;
    padding: 20px;
}

    .game-wrapper {
    background: rgba(10, 5, 20, 0.8);
    backdrop-filter: blur(12px);
    border-radius: 32px;
    padding: 20px;
    border: 1px solid #6d4d90;
    box-shadow: 0 0 30px rgba(106, 62, 158, 0.3);
}

    .game-container {
    max-width: 2000px;
    width: 100%;
    background: linear-gradient(145deg, #141024, #0b0820);
    border-radius: 32px;
    padding: 30px 25px;
    border: 1px;
}

    .game-header h1 {
    font-size: 2.4rem;
    letter-spacing: 4px;
    text-shadow: 0 0 10px #a55eff, 0 0 20px #6a3e9e;
    color: #d9b8ff;
    text-align: center;
}

    .sub {
    color: #8a6bbf;
    text-align: center;
}

    .hangman-area {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
    align-items: center;
    margin-bottom: 30px;
}

    .canvas-box {
    background: #05030c;
    border-radius: 24px;
    padding: 15px;
    border: 1px solid #6a3e9e;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-shrink: 0;
}

    canvas {
    display: block;
    background: #1e1a2a;
    border-radius: 16px;
    width: auto;
    max-width: 100%;
    height: auto;
}


    .word-section {
    flex: 1;
    min-width: 240px;
    background: rgba(24, 19, 47, 0.7);
    backdrop-filter: blur(4px);
    border-radius: 32px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 20px;
}

    .word-display {
    font-family: 'Courier New', monospace;
    font-size: 2rem;
    letter-spacing: 10px;
    background: #1e1a2e;
    padding: 15px 20px;
    border-radius: 48px;
    color: #e5b8ff;
    text-shadow: 0 0 5px #a55eff;
    text-align: center;
    word-break: break-all;
}

    .hint-box {
    background: rgba(0, 0, 0, 0.6);
    padding: 9px 18px;
    border-radius: 32px;
    color: #b89aff;
}

    .mistakes {
    background: #1b364bc8;
    padding: 6px 14px;
    border-radius: 32px;
    color: #3a8bd6;
}

    .keyboard {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    margin: 25px 0 20px;
}

    .key {
    background: #2a1e3a;
    width: 55px;
    height: 55px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    font-weight: bold;
    font-family: monospace;
    border-radius: 20px;
    cursor: pointer;
    transition: 0.07s linear;
    color: #eacdff;
    box-shadow: 0 5px 0 #140e22;
    border: none;
}

    .key:active {
    transform: translateY(2px);
    box-shadow: 0 2px 0 #140e22;
}

    .key.disabled {
    opacity: 0.5;
    transform: none;
    cursor: default;
}

    .key.correct {
    background: #6a4e9e;
    box-shadow: 0 5px 0 #3a2a5a;
}

    .key.wrong {
    background: #8a3a5a;
}

    .action-buttons {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 10px;
    flex-wrap: wrap;
}

    button {
    background: #3a2a5a;
    border: none;
    padding: 12px 28px;
    font-size: 1.1rem;
    font-weight: bold;
    font-family: monospace;
    border-radius: 48px;
    color: #eacdff;
    cursor: pointer;
    transition: 0.1s;
    box-shadow: 0 4px 0 #1e142e;
}

    button:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 #1e142e;
}

    .message-area {
    text-align: center;
    margin-top: 20px;
    font-size: 1.1rem;
    font-weight: bold;
    background: rgba(0, 0, 0, 0.6);
    padding: 10px;
    border-radius: 48px;
    color: #cbb2ff;
}

    @media (max-width: 680px) {
        .key {
        width: 45px;
        height: 45px;
        font-size: 1.2rem;
    }
    
        .word-display {
        font-size: 1.3rem;
        letter-spacing: 6px;
    }
    
        .game-container {
        padding: 20px 15px;
    }
    
        .hangman-area {
        flex-direction: column;
    }
    
        .canvas-box {
        width: 100%;
        display: flex;
        justify-content: center;
    }
}
</style>
</head>
<body>
    <div class="game-wrapper">
        <div class="game-container">
            <div class="game-header">
                <h1> ВИСЕЛИЦА </h1>
            </div>

            <div class="hangman-area">
                <div class="canvas-box">
                    <canvas id="hangmanCanvas" width="260" height="280"></canvas>
                </div>
                <div class="word-section">
                    <div class="word-display" id="wordDisplay"></div>
                    <div class="hint-box" id="hintText"> Подсказка: загружается...</div>
                    <div class="mistakes" id="mistakesCount"> Ошибки: 0 / 6</div>
                </div>
            </div>

            <div class="keyboard" id="keyboardContainer"></div>

            <div class="action-buttons">
                <button class="new-game-btn" id="newGameBtn"> НОВОЕ СЛОВО</button>
                <button class="reset-btn" id="resetGameBtn"> СБРОС ИГРЫ</button>
            </div>
            <div class="message-area" id="messageBox"> нажми на буквы </div>
        </div>
    </div>

<script>
    const wordsDB = [
    { word: "ПРОГРАММИРОВАНИЕ", hint: "Язык, на котором пишут код" },
    { word: "ВИСЕЛИЦА", hint: "Название этой игры" },
    { word: "РАЗРАБОТЧИК", hint: "Тот, кто создаёт игры и приложения" },
    { word: "КОМПЬЮТЕР", hint: "Устройство для игр и работы" },
    { word: "АЛГОРИТМ", hint: "Последовательность действий для решения задачи" },
    { word: "КЛАВИАТУРА", hint: "На ней печатают буквы и символы" },
    { word: "МОНИТОР", hint: "Экран, на который смотрят" },
    { word: "ИНТЕРНЕТ", hint: "Глобальная сеть" },
    { word: "БРАУЗЕР", hint: "Программа для просмотра сайтов" },
    { word: "КИБЕРСПОРТ", hint: "Соревнования по компбютерным играм" },
    { word: "БОТ", hint: "Программа, которая выполняет задачи автоматически" },
    { word: "ОШИБКА", hint: "Это находят и исправляют тестировщики" },
    { word: "КАЗНЬ", hint: "Что ждёт этого неповинного человечка, если ты ПРОИГРАЕШЬ?" },
    { word: "САЙТ", hint: "Страница в интернете" }
];

    let currentWordObj = null;
    let currentWord = "";
    let guessedLetters = new Set();
    let wrongLetters = new Set();
    let maxMistakes = 6;
    let gameActive = true;
    let currentMistakes = 0;

    const canvas = document.getElementById("hangmanCanvas");
    const ctx = canvas.getContext("2d");
    const wordDisplayDiv = document.getElementById("wordDisplay");
    const hintTextDiv = document.getElementById("hintText");
    const mistakesSpan = document.getElementById("mistakesCount");
    const messageBox = document.getElementById("messageBox");
    const keyboardContainer = document.getElementById("keyboardContainer");


    function drawHangman(steps) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.lineWidth = 3;
    ctx.strokeStyle = "#b036d4";
    ctx.fillStyle = "#2e241a";
    

    ctx.beginPath();
    ctx.moveTo(20, 250);
    ctx.lineTo(200, 250);
    ctx.stroke();
    
    ctx.beginPath();
    ctx.moveTo(60, 250);
    ctx.lineTo(60, 40);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(60, 40);
    ctx.lineTo(150, 40);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(150, 40);
    ctx.lineTo(150, 65);
    ctx.stroke();
    
    if (steps >= 1) {
        ctx.beginPath();
        ctx.arc(150, 80, 15, 0, Math.PI * 2);
        ctx.stroke();
    }
    if (steps >= 2) {
        ctx.beginPath();
        ctx.moveTo(150, 95);
        ctx.lineTo(150, 155);
        ctx.stroke();
    }
    if (steps >= 3) {
        ctx.beginPath();
        ctx.moveTo(150, 110);
        ctx.lineTo(120, 135);
        ctx.stroke();
    }
    if (steps >= 4) {
        ctx.beginPath();
        ctx.moveTo(150, 110);
        ctx.lineTo(180, 135);
        ctx.stroke();
    }
    if (steps >= 5) {
        ctx.beginPath();
        ctx.moveTo(150, 155);
        ctx.lineTo(120, 190);
        ctx.stroke();
    }
    if (steps >= 6) {
        ctx.beginPath();
        ctx.moveTo(150, 155);
        ctx.lineTo(180, 190);
        ctx.stroke();
    }
}

    function updateWordDisplay() {
    let display = "";
    for (let ch of currentWord) {
        if (guessedLetters.has(ch.toLowerCase())) {
            display += ch + " ";
        } else {
            display += "_ ";
        }
    }
    wordDisplayDiv.innerText = display.trim() === "" ? "ПОБЕДА!" : display;
}

    function checkWin() {
    let allGuessed = true;
    for (let ch of currentWord) {
        if (!guessedLetters.has(ch.toLowerCase())) {
            allGuessed = false;
            break;
        }
    }
    if (allGuessed && gameActive && currentWord !== "") {
        gameActive = false;
        messageBox.innerHTML = "ПОБЕДА! Ты спас человечка!";
        messageBox.style.color = "#b9f6ca";
        drawHangman(currentMistakes);
        disableKeyboard(true);
        return true;
    }
    return false;
}

    function checkLoss() {
    if (currentMistakes >= maxMistakes && gameActive) {
        gameActive = false;
        messageBox.innerHTML = `ВЫ ПРОИГРАЛИ! Загадано слово: ${currentWord}`;
        messageBox.style.color = "#ffaa88";
        disableKeyboard(true);
        drawHangman(maxMistakes);
        return true;
    }
    return false;
}

    function guessLetter(letter) {
    if (!gameActive) return false;
    const lowerLetter = letter.toLowerCase();
    if (guessedLetters.has(lowerLetter) || wrongLetters.has(lowerLetter)) return false;
    
    const isCorrect = currentWord.toLowerCase().includes(lowerLetter);
    
    if (isCorrect) {
        guessedLetters.add(lowerLetter);
        updateWordDisplay();
        updateKeyStyle(letter, "correct");
        if (checkWin()) return true;
    } else {
        wrongLetters.add(lowerLetter);
        currentMistakes++;
        updateMistakesUI();
        drawHangman(currentMistakes);
        updateKeyStyle(letter, "wrong");
        if (checkLoss()) return true;
    }
    return true;
}

    function updateMistakesUI() {
    mistakesSpan.innerText = `Ошибки: ${currentMistakes} / ${maxMistakes}`;
}

    function updateKeyStyle(letter, status) {
    const keyDiv = document.getElementById(`key_${letter}`);
    if (keyDiv) {
        if (status === "correct") {
            keyDiv.classList.add("correct");
            keyDiv.classList.remove("wrong");
        } else if (status === "wrong") {
            keyDiv.classList.add("wrong");
        }
        keyDiv.classList.add("disabled");
    }
}

    function disableKeyboard(disabled) {
    const allKeys = document.querySelectorAll(".key");
    allKeys.forEach(key => {
        if (disabled) {
            key.style.pointerEvents = "none";
        } else {
            key.style.pointerEvents = "auto";
        }
    });
}


    function generateKeyboard() {
    const russianAlphabet = "АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ".split("");
    keyboardContainer.innerHTML = "";
    russianAlphabet.forEach(letter => {
        const keyDiv = document.createElement("div");
        keyDiv.className = "key";
        keyDiv.id = `key_${letter}`;
        keyDiv.innerText = letter;
        keyDiv.addEventListener("click", (e) => {
            e.stopPropagation();
            if (!gameActive) return;
            if (guessedLetters.has(letter.toLowerCase()) || wrongLetters.has(letter.toLowerCase())) return;
            guessLetter(letter);
        });
        keyboardContainer.appendChild(keyDiv);
    });
}

    function resetGameState() {
    gameActive = true;
    guessedLetters.clear();
    wrongLetters.clear();
    currentMistakes = 0;
    updateMistakesUI();
    drawHangman(0);
    updateWordDisplay();
    messageBox.innerHTML = "Игра продолжается! Выбери букву";
    messageBox.style.color = "#cbd5e6";
    
    document.querySelectorAll(".key").forEach(key => {
        key.classList.remove("correct", "wrong", "disabled");
        key.style.pointerEvents = "auto";
    });
    disableKeyboard(false);
    if (currentWordObj) {
        hintTextDiv.innerHTML = `Подсказка: ${currentWordObj.hint}`;
    }
}

    function loadNewWord() {
    const randomIndex = Math.floor(Math.random() * wordsDB.length);
    currentWordObj = { ...wordsDB[randomIndex] };
    currentWord = currentWordObj.word.toUpperCase();
    hintTextDiv.innerHTML = `Подсказка: ${currentWordObj.hint}`;
    resetGameState();
}


    function fullReset() {
    resetGameState();
}

    function initGame() {
    generateKeyboard();
    const randomIndex = Math.floor(Math.random() * wordsDB.length);
    currentWordObj = { ...wordsDB[randomIndex] };
    currentWord = currentWordObj.word.toUpperCase();
    hintTextDiv.innerHTML = `Подсказка: ${currentWordObj.hint}`;
    gameActive = true;
    guessedLetters.clear();
    wrongLetters.clear();
    currentMistakes = 0;
    updateMistakesUI();
    drawHangman(0);
    updateWordDisplay();
    messageBox.innerHTML = "Угадывай буквы!";
    disableKeyboard(false);
    
    document.querySelectorAll(".key").forEach(key => {
        key.classList.remove("correct", "wrong", "disabled");
        key.style.pointerEvents = "auto";
    });
}

    document.getElementById("newGameBtn").addEventListener("click", () => {
    loadNewWord();
});
    document.getElementById("resetGameBtn").addEventListener("click", () => {
    fullReset();
});
    initGame();
</script>
</body>
</html>
